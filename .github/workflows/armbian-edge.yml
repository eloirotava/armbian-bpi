name: Build Armbian Multi-Board (Trixie Minimal)

on:
  workflow_dispatch: 

jobs:
  armbian-build:
    name: Compilando edge (${{ matrix.board }})
    runs-on: ubuntu-latest
    
    strategy:
      # fail-fast: false garante que se a compilação de uma placa falhar, 
      # o GitHub continuará compilando as outras.
      fail-fast: false 
      matrix:
        # Nomes padrão geralmente usados pelo Armbian para essas placas:
        board: [bananapi, aml-s9xx-box, rk322x-box, aml-s805-mxq]

    steps:
      - name: Preparando o Tradutor QEMU (Intel -> ARM)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm,arm64

      - name: Baixando o Armbian Build Framework
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: armbian-build

      # DICA: Se você precisar injetar os códigos dos seus drivers portados, 
      # você pode adicionar um step aqui para copiar seus arquivos .patch 
      # para a pasta armbian-build/userpatches/kernel/

      - name: Executando o Compile.sh (Modo Silencioso/Automático)
        run: |
          cd armbian-build
          ./compile.sh \
            BOARD=${{ matrix.board }} \
            BRANCH=edge \
            RELEASE=trixie \
            BUILD_MINIMAL=yes \
            BUILD_DESKTOP=no \
            EXPERT=yes \
            KERNEL_CONFIGURE=no \
            COMPRESS_OUTPUTIMAGE=img
            
      - name: Resgatando o Arquivo .img
        uses: actions/upload-artifact@v4
        with:
          # O nome do artefato muda dinamicamente com base na placa
          name: Imagem-${{ matrix.board }}-Trixie-Minimal
          path: armbian-build/output/images/*.img